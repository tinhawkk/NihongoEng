<!DOCTYPE html>
<html><head><style>
  body { background: #333; color: white; margin: 20px; font-family: sans-serif; }
  canvas { image-rendering: pixelated; border: 1px solid #999; cursor: crosshair; }
</style></head>
<body>
  <p>Click on the canvas to see tile coordinates (assuming 48x48 blocks, or 16x16 original scaled by 3).</p>
  <div id="output" style="font-size:20px; font-weight:bold; margin-bottom:10px; height: 30px;">--</div>
  <canvas id="c"></canvas>
  <script>
    const img = new Image();
    img.src = 'libassetpack-tiled.png';
    const SIZE = 48; // scale by 3 applied to 16x16?
    img.onload = () => {
      const scale = 3;
      const c = document.getElementById('c');
      c.width = img.width * scale;
      c.height = img.height * scale;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, 0, 0, c.width, c.height);
      
      // Draw grid
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 1;
      for (let x = 0; x < c.width; x += SIZE) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, c.height); ctx.stroke();
      }
      for (let y = 0; y < c.height; y += SIZE) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(c.width, y); ctx.stroke();
      }

      c.onmousemove = e => {
        const rect = c.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const tx = Math.floor(x / SIZE);
        const ty = Math.floor(y / SIZE);
        document.getElementById('output').textContent = `Pixel: ${Math.floor(x/scale)}, ${Math.floor(y/scale)} | Tile: [${tx}, ${ty}]`;
      };
      
      let clickCount = 0;
      c.onclick = e => {
        const rect = c.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const tx = Math.floor(x / SIZE);
        const ty = Math.floor(y / SIZE);
        const rawX = Math.floor(x/scale);
        const rawY = Math.floor(y/scale);
        console.log(`CLICK ${++clickCount}: raw[${rawX}, ${rawY}] tile[${tx}, ${ty}]`);
      };
    };
  </script>
</body>
</html>
